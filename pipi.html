<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐕 柴犬皮皮 · 元气小狗屋</title>
    <!-- 现代化字体 & 图标库 (Font Awesome 免费版) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- 外部 CSS 文件 -->
    <link href="styles/style.css" rel="stylesheet" />
  </head>
  <body>
    <h1>柴犬 皮皮</h1>

    <!-- 可点击图片，切换皮皮萌照 -->
    <img src="images/IMG_4057.JPG" alt="小狗皮皮 · 柴犬" id="mainShibaImg" />
    <div class="img-hint">
      <i class="fa-regular fa-hand-pointer"></i> 戳戳图片，皮皮会变身！
    </div>

    <p>
      <i
        class="fa-solid fa-bone"
        style="margin-right: 10px; color: #c9671e"
      ></i>
      这是一只叫皮皮的柴犬，元气满满！
    </p>

    <!-- 使用网格展示两个列表，更有设计感 -->
    <div class="list-grid">
      <div class="list-box">
        <p><i class="fa-regular fa-star"></i> 皮皮的可爱之处</p>
        <ul>
          <li>眼睛（圆溜溜）</li>
          <li>鼻子（湿漉漉）</li>
          <li>嘴巴（笑眯眯）</li>
          <li>尾巴（棉花糖）</li>
        </ul>
      </div>
      <div class="list-box">
        <p><i class="fa-regular fa-clock"></i> 皮皮每天要做</p>
        <ol>
          <li>出去玩（狂奔）</li>
          <li>吃饭（狼吞虎咽）</li>
          <li>睡觉（打呼噜）</li>
          <li>等主人摸摸</li>
        </ol>
      </div>
    </div>

    <!-- 超链接加了小图标 -->
    <p style="background: #ffdbb5; display: block; text-align: center">
      <i class="fa-solid fa-paw"></i> 点击此处了解
      <a href="https://baike.sogou.com/v202157.htm" target="_blank"
        ><i class="fa-solid fa-dog"></i> 柴犬百科</a
      >
      跟皮皮一起玩 <i class="fa-regular fa-face-smile-wink"></i>
    </p>

    <!-- 个性化按钮 + 主人问候 -->
    <button id="changeUserBtn">
      <i class="fa-solid fa-user-plus"></i> 谁是皮皮的主人？
    </button>

    <!-- 动态小区域显示当前主人（后期被js修改） -->
    <div class="footnote">
      <i class="fa-solid fa-heart"></i> 今天也要记得撸柴哦
      <i class="fa-solid fa-heart"></i>
    </div>

    <!-- 外部 JavaScript 文件 -->
    <script src="scripts/main.js"></script>
  </body>
</html>
